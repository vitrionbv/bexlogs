name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (defaults to main)'
        required: false
        default: 'main'

permissions:
  contents: read

jobs:
  laravel:
    name: Laravel — composer test + vite build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: bexlogs
          POSTGRES_USER: bexlogs
          POSTGRES_PASSWORD: bexlogs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bexlogs -d bexlogs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: laravel

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          extensions: pdo_pgsql, intl, zip, bcmath, pcntl, sockets
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: laravel/package-lock.json

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Copy environment
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Migrate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: bexlogs
          DB_USERNAME: bexlogs
          DB_PASSWORD: bexlogs
        run: php artisan migrate --force

      - name: Build frontend
        run: npm run build

      - name: Run composer test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: bexlogs
          DB_USERNAME: bexlogs
          DB_PASSWORD: bexlogs
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: composer test

  scraper:
    name: Scraper — typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - run: npm ci --no-audit --no-fund

      - run: npm run typecheck

      - run: npm run build

  deploy:
    name: Pull, build, redeploy
    needs: [laravel, scraper]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: [self-hosted, linux, bexlogs]
    timeout-minutes: 25
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    env:
      APP_DIR: /opt/bexlogs
      COMPOSE: docker compose -f /opt/bexlogs/docker-compose.production.yml --env-file /opt/bexlogs/laravel/.env

    steps:
      # We deliberately don't use actions/checkout — the runner already has
      # the repo at /opt/bexlogs and that's the working tree we deploy from.
      # Doing a checkout here would create a *second* clone in
      # ${{ github.workspace }} that would never see laravel/.env.
      - name: Resolve target ref
        id: ref
        run: |
          TARGET="${{ github.event.inputs.ref || github.ref_name }}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Target ref: $TARGET"

      - name: Pull source
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          git fetch --all --prune
          git checkout "${{ steps.ref.outputs.target }}"
          git pull --ff-only origin "${{ steps.ref.outputs.target }}"
          echo "HEAD now at $(git rev-parse --short HEAD)"

      - name: Build images
        working-directory: ${{ env.APP_DIR }}
        run: $COMPOSE build app scraper

      - name: Bring stack up
        working-directory: ${{ env.APP_DIR }}
        run: $COMPOSE up -d --remove-orphans

      - name: Wait for app health
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if $COMPOSE exec -T app curl -fsS http://127.0.0.1/up >/dev/null 2>&1; then
              echo "app healthy after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::app did not become healthy within 120s"
          $COMPOSE logs --tail=200 app
          exit 1

      - name: Run migrations
        working-directory: ${{ env.APP_DIR }}
        run: $COMPOSE exec -T app php artisan migrate --force

      - name: Warm caches
        working-directory: ${{ env.APP_DIR }}
        run: |
          $COMPOSE exec -T app php artisan config:cache
          $COMPOSE exec -T app php artisan route:cache
          $COMPOSE exec -T app php artisan view:cache
          $COMPOSE exec -T app php artisan event:cache

      - name: Restart Reverb
        working-directory: ${{ env.APP_DIR }}
        run: |
          $COMPOSE exec -T app php artisan reverb:restart || true
          $COMPOSE restart reverb

      - name: Restart workers
        working-directory: ${{ env.APP_DIR }}
        run: |
          $COMPOSE exec -T app php artisan queue:restart || true
          $COMPOSE restart queue scheduler

      - name: External health check
        if: vars.DEPLOY_DOMAIN != ''
        run: |
          curl -fsSL --retry 10 --retry-delay 3 --max-time 10 \
            "https://${{ vars.DEPLOY_DOMAIN }}/up"

      - name: Notify on failure
        if: failure() && env.NOTIFY_WEBHOOK != ''
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"BexLogs deploy failed: ${{ github.sha }}\"}" \
            "$NOTIFY_WEBHOOK" || true
