user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Excel imports + extension uploads can be chunky.
    client_max_body_size 64M;
    client_body_buffer_size 1m;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Hide hidden files except .well-known (LE-friendly even though Caddy
        # handles certs, in case someone bypasses the proxy).
        location ~ /\.(?!well-known).* {
            deny all;
        }

        # Vite-fingerprinted assets — long cache, immutable.
        location ^~ /build/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Other static assets — short cache.
        location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|woff2?|ttf|svg|map)$ {
            expires 7d;
            add_header Cache-Control "public";
            try_files $uri /index.php?$query_string;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_read_timeout 300;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        }
    }
}
