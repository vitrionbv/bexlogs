; BexLogs — production PHP overrides.
; Loaded as zz-bexlogs.ini so it runs after the bundled php.ini-production.

memory_limit = ${PHP_MEMORY_LIMIT}
upload_max_filesize = ${PHP_UPLOAD_MAX_FILESIZE}
post_max_size = ${PHP_POST_MAX_SIZE}
max_execution_time = 300
max_input_time = 120
date.timezone = UTC
expose_php = Off

; OPcache — production tuning. Don't stat files on every request; cache cleared
; on deploy via the artisan cache rebuild in the entrypoint.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = ${PHP_OPCACHE_VALIDATE_TIMESTAMPS}
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.save_comments = 1

; Sessions live in Redis-backed Laravel session driver, but if we ever fall
; back to the file driver we want it under storage/.
session.gc_maxlifetime = 7200

; Send PHP errors to stderr so docker logs picks them up.
log_errors = On
error_log = /dev/stderr
