  window.t = function(translationKey) {
    // Support relative translationKeys so t('.thanks') is converted to t('javascript.thanks')
    if (translationKey[0] === '.') translationKey = 'javascript' + translationKey;

    // First try to find key in current locale, then fallback to default locale, then throw error
    var localeKey = window.I18n_locale + "." + translationKey;
    var defaultLocaleKey = window.I18n_default_locale + "." + translationKey;

    if (_.has(window.I18n, localeKey)) {
      return _.get(window.I18n, localeKey);
    } else if (_.has(window.I18n, defaultLocaleKey)) {
      return _.get(window.I18n, defaultLocaleKey);
    } else {
      var error = new Error("Translation not found: " + window.I18n_locale + "." + translationKey);

      if (typeof Honeybadger !== 'undefined') {
        Honeybadger.notify(error);
      }

      console.error(error);

      return 'Missing translation: ' + translationKey;
    }
  }
